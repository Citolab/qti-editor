name: Deploy Editor and Site

on:
  workflow_run:
    workflows:
      - "CI: push-quality"
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-editor-site
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      editor: ${{ steps.filter.outputs.editor }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - name: Checkout triggering commit
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve diff base
        id: base
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
        shell: bash
        run: |
          base_sha="$(git rev-parse \"${{ github.event.workflow_run.head_sha }}^\" 2>/dev/null || true)"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"

      - name: Detect relevant changes
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "editor=true" >> "$GITHUB_OUTPUT"
            echo "site=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ steps.base.outputs.base_sha }}"
          head_sha="${{ github.event.workflow_run.head_sha }}"

          if [[ -z "$base_sha" ]]; then
            echo "editor=false" >> "$GITHUB_OUTPUT"
            echo "site=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only "$base_sha" "$head_sha")

          editor_re="^(apps/editor/|packages/interfaces/|packages/qti/|packages/prosemirror/|packages/ui/|firebase\.json|\.firebaserc|scripts/prepare-hosting-editor\.mjs|package\.json|pnpm-lock\.yaml|\.github/workflows/deploy-editor\.yml)"
          site_re="^(apps/site/|packages/interfaces/|packages/qti/|packages/prosemirror/|packages/ui/|firebase\.json|\.firebaserc|scripts/prepare-hosting-site\.mjs|package\.json|pnpm-lock\.yaml|\.github/workflows/deploy-site\.yml)"

          if echo "$changed" | grep -qE "$editor_re"; then
            echo "editor=true" >> "$GITHUB_OUTPUT"
          else
            echo "editor=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$changed" | grep -qE "$site_re"; then
            echo "site=true" >> "$GITHUB_OUTPUT"
          else
            echo "site=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-editor:
    needs: changes
    if: ${{ needs.changes.outputs.editor == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build editor hosting bundle
        run: pnpm deploy:build:editor

      - name: Deploy Firebase editor target
        run: npx firebase-tools@latest deploy --only hosting:editor --token "${{ secrets.FIREBASE_TOKEN }}"

  deploy-site:
    needs: changes
    if: ${{ needs.changes.outputs.site == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site hosting bundle
        run: pnpm deploy:build:site

      - name: Deploy Firebase site target
        run: npx firebase-tools@latest deploy --only hosting:site --token "${{ secrets.FIREBASE_TOKEN }}"
