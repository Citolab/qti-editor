name: Release Packages

on:
  workflow_run:
    workflows:
      - "CI: push-quality"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.filter.outputs.should_release }}
    steps:
      - name: Checkout triggering commit
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Detect release-relevant changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ] || [ "${{ github.event.workflow_run.event }}" != "push" ] || [ "${{ github.event.workflow_run.head_branch }}" != "main" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only HEAD^ HEAD)"
          if echo "$changed_files" | grep -Eq '^(package\.json$|pnpm-lock\.yaml$|packages/interfaces/|packages/qti/core/|packages/prosemirror/(interaction-[^/]+|qti-item-divider)/|\.github/workflows/release\.yml$)'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: changes
    if: ${{ needs.changes.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: |
          pnpm --filter @qti-editor/interfaces build
          pnpm --filter @qti-editor/interaction-shared build
          pnpm --filter @qti-editor/interaction-associate build
          pnpm --filter @qti-editor/interaction-choice build
          pnpm --filter @qti-editor/interaction-inline-choice build
          pnpm --filter @qti-editor/interaction-match build
          pnpm --filter @qti-editor/interaction-order build
          pnpm --filter @qti-editor/interaction-select-point build
          pnpm --filter @qti-editor/interaction-text-entry build
          pnpm --filter @qti-editor/interaction-extended-text build
          pnpm --filter @qti-editor/interaction-gap-match build
          pnpm --filter @qti-editor/interaction-hottext build
          pnpm --filter @qti-editor/qti-item-divider build
          pnpm --filter @qti-editor/core build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        run: pnpm exec multi-semantic-release --ignore-private-packages
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Restore workspace refs and sync lockfile
        run: |
          git fetch origin main
          git rebase origin/main
          find packages -name "package.json" ! -path "*/node_modules/*" ! -path "*/dist/*" \
            -exec sed -i -E 's/"(@qti-editor\/[^"]+)": "[0-9][^"]*"/"\1": "workspace:*"/g' {} +
          pnpm install --no-frozen-lockfile
          git add pnpm-lock.yaml
          find packages -name "package.json" ! -path "*/node_modules/*" ! -path "*/dist/*" | xargs git add
          git diff --staged --quiet || git commit -m "chore: restore workspace refs after release [skip ci]"
          git push origin HEAD:main
