name: Release Packages

on:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/interfaces/**"
      - "packages/qti/core/**"
      - "packages/prosemirror/interaction-*/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: |
          pnpm --filter @qti-editor/interfaces build
          pnpm --filter @qti-editor/interaction-shared build
          pnpm --filter @qti-editor/interaction-choice build
          pnpm --filter @qti-editor/interaction-inline-choice build
          pnpm --filter @qti-editor/interaction-match build
          pnpm --filter @qti-editor/interaction-order build
          pnpm --filter @qti-editor/interaction-select-point build
          pnpm --filter @qti-editor/interaction-text-entry build
          pnpm --filter @qti-editor/interaction-extended-text build
          pnpm --filter @qti-editor/core build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
