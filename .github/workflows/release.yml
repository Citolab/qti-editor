name: "Manual: release and publish packages"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Dry-run (no commits, tags, or publishes)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release on changed packages (dry-run)
        if: ${{ inputs.dry_run }}
        run: pnpm run ci:release:changed:dry
        env:
          GITHUB_TOKEN: ''
          HUSKY: 0

      - name: Run semantic-release on changed packages
        if: ${{ !inputs.dry_run }}
        run: pnpm run ci:release:changed
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Push release tags
        if: ${{ !inputs.dry_run }}
        run: git push origin HEAD --tags
