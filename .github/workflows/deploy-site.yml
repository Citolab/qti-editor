name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - "apps/site/**"
      - "packages/interfaces/**"
      - "packages/qti/**"
      - "packages/prosemirror/**"
      - "packages/ui/**"
      - "firebase.json"
      - ".firebaserc"
      - "scripts/prepare-hosting-site.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site hosting bundle
        run: pnpm deploy:build:site

      - name: Deploy Firebase site target
        run: npx firebase-tools@latest deploy --only hosting:site --token "${{ secrets.FIREBASE_TOKEN }}"
