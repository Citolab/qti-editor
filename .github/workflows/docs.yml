name: Update Astro Docs
on:
  workflow_run:
    workflows:
      - "CI: push-quality"
    types:
      - completed
  workflow_dispatch: {}

jobs:
  update-docs:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    env:
      RUST_LOG: codex_api=trace,codex_core=debug
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Detect package changes
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="$(git rev-parse "${{ github.event.workflow_run.head_sha }}^" 2>/dev/null || true)"
          if [[ -z "$base_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base_sha" "${{ github.event.workflow_run.head_sha }}" | grep -q '^packages/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: openai/codex-action@v1
        if: ${{ steps.filter.outputs.changed == 'true' }}
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}/openai/v1/responses
          model: ${{ vars.AZURE_OPENAI_DOCS_DEPLOYMENT }}
          permission-profile: ":workspace"
          prompt: |
            Code in packages changed. Update the Astro docs in
            apps/site/src/content/docs to match.

      - name: Open PR with doc updates
        if: ${{ steps.filter.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: update Astro docs"
          title: "docs: update Astro docs"
          body: Automated update from the docs workflow after a change under `packages/` on `main`.
          branch: docs/auto-update
          delete-branch: true