<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QTI ProseMirror — Roundtrip Minimal</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body>
    <header>
      <h1>QTI ProseMirror — Roundtrip Minimal</h1>
      <p>Pick a Kennisnet item to import it, edit it with ProseMirror, and export it back to QTI 3.0.</p>
    </header>
    <main id="app">
      <select id="item-list" size="10" aria-label="QTI items"></select>
      <section id="editor-pane">
        <div id="editor-toolbar">
          <span id="editor-title">Select an item to start editing.</span>
          <button id="export-btn" type="button" disabled>Export QTI</button>
        </div>
        <div id="editor-host"></div>
      </section>
      <aside id="attributes-panel" aria-label="Attributes"></aside>
    </main>
  </body>
</html>
