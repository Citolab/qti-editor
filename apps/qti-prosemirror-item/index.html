<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QTI ProseMirror — Roundtrip Minimal</title>
    <link rel="stylesheet" href="./src/app.css" />
    <link rel="stylesheet" href="./src/qti.css" />
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body>
    <header>
      <h1>
        Voorvertoning toets
        <a href="https://toetsen.wikiwijs.nl/preview/4f19076e-9bb1-5886-b549-50e7da41163d">
          link
        </a>
      </h1>
      <div style="display:inline-flex; gap:0.5rem;">
        <button id="export-btn" type="button" disabled>Download item.xml</button>
        <button id="open-btn" type="button" disabled>Open in qti.citolab.nl</button>
      </div>
    </header>
    <main id="app">
      <section id="editor-pane">
        <div id="editor-host"></div>
      </section>
      <aside id="attributes-pane" aria-label="Attributes">
        <div id="attributes-panel" aria-label="Attributes"></div>
      </aside>
      <aside id="item-pane" aria-label="QTI items">
        <select id="item-list" size="16" aria-label="QTI items"></select>
      </aside>
    </main>
  </body>
</html>
